const FINANCEIRO_INICIAL = {

    { label: "Beliches e colchões (20 camas)", valor: 11500 },
    { label: "Equipamentos (ar, Wi-Fi, TV)", valor: 10000 },

    { label: "Marketing inicial + fotos + site", valor: 4500 },
    { label: "Capital de giro (3 meses)", valor: 21500 },
  ],
  custosFixos: [
    { label: "Aluguel do imóvel", valor: 5750 },
    { label: "Energia elétrica", valor: 1500 },
    { label: "Água", valor: 550 },
    { label: "Internet + streaming", valor: 300 },
    { label: "Funcionários (1–2 pessoas)", valor: 4000 },
    { label: "Plataformas (~15% da receita)", valor: 3750 },
    { label: "Manutenção e limpeza", valor: 800 },
  ],
  camas: 20, diariaBase: 75, diariaFimSemana: 120,
  ocupacao: { pessimista: 40, realista: 65, otimista: 90 },
  barPorCamaDia: 40, atividadesMes: 9000,
};

const fmt = n => "R$ " + Math.round(n).toLocaleString("pt-BR");

function calcular(fin) {
  const totalInvestimento = fin.investimento.reduce((s, i) => s + Number(i.valor || 0), 0);
  const totalCustoFixo = fin.custosFixos.reduce((s, i) => s + Number(i.valor || 0), 0);
  const diariaMedia = (Number(fin.diariaBase) * 5 + Number(fin.diariaFimSemana) * 2) / 7;
  const cenario = (ocupPct) => {
    const receitaHospedagem = fin.camas * diariaMedia * 30 * (ocupPct / 100);
    const receitaBar = fin.camas * fin.barPorCamaDia * 30 * (ocupPct / 100);
    const receitaAtividades = Number(fin.atividadesMes || 0);
    const receitaTotal = receitaHospedagem + receitaBar + receitaAtividades;
    const lucro = receitaTotal - totalCustoFixo;
    return { receitaHospedagem, receitaBar, receitaAtividades, receitaTotal, lucro };
  };
  const pessimista = cenario(fin.ocupacao.pessimista);
  const realista = cenario(fin.ocupacao.realista);
  const otimista = cenario(fin.ocupacao.otimista);
  const breakEven = realista.lucro > 0 ? Math.ceil(totalInvestimento / realista.lucro) : null;
  return { totalInvestimento, totalCustoFixo, diariaMedia, pessimista, realista, otimista, breakEven };
}

const TABS = [

function Nav({ aba, setAba }) {

      {TABS.map(t => {

function Panel({ label, children, style: s }) {

}

    </div>
  );
}

      <span style={{fontSize:18}}>{icon}</span>

}

function VisaoGeral({ calc }) {

              <span style={{fontSize:18,lineHeight:1}}>{ico}</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#d4e8ec",marginBottom:2}}>{tit}</div>
                <div style={{fontSize:11.5,color:"#5a8090"}}>{sub}</div>

            </div>
          ))}
        </div>
      </Panel>

function Cronograma({ fases, toggleTarefa }) {
  return (
    <div style={{maxWidth:680,margin:"0 auto"}}>
      {fases.map(f => {
        const feitas = f.tarefas.filter(t => t.feito).length;
        const pct = Math.round((feitas / f.tarefas.length) * 100);
        return (
          <div key={f.id} style={{background:"#112230",borderRadius:8,border:"1px solid #1e3f4f",borderLeft:`4px solid ${f.cor}`,marginBottom:16,overflow:"hidden"}}>
            <div style={{padding:"16px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:f.cor,marginBottom:2}}>{f.nome}</div>
                <div style={{fontFamily:"monospace",fontSize:11,color:"#5a8090"}}>{f.periodo}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"monospace",fontSize:18,color:feitas===f.tarefas.length?f.cor:"#3a6070",fontWeight:700}}>{feitas}/{f.tarefas.length}</div>
                <div style={{fontSize:10,color:"#3a6070"}}>tarefas</div>
              </div>
            </div>
            <div style={{height:3,background:"#0a1e2a",margin:"0 20px 14px"}}>
              <div style={{height:"100%",width:`${pct}%`,background:f.cor,borderRadius:2,transition:"width .4s ease",boxShadow:`0 0 8px ${f.cor}88`}}/>
            </div>
            <div style={{padding:"0 20px 16px",display:"flex",flexDirection:"column",gap:6}}>
              {f.tarefas.map(t => (
                <label key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",padding:"8px 12px",borderRadius:6,background:t.feito?`${f.cor}0f`:"#0e2535",border:`1px solid ${t.feito?f.cor+"33":"#1a3545"}`,transition:"all .15s"}}>

                </label>

}

function LineItems({ titulo, itens, setItens }) {
  const atualizar = (i, campo, valor) => setItens(itens.map((it, idx) => idx===i?{...it,[campo]:campo==="valor"?Number(valor):valor}:it));
  const remover = i => setItens(itens.filter((_,idx) => idx!==i));
  const adicionar = () => setItens([...itens,{label:"Novo item",valor:0}]);
  const total = itens.reduce((s,it) => s+Number(it.valor||0),0);
  return (
    <Panel label={titulo}>
      {itens.map((it,i) => (
        <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <input value={it.label} onChange={e=>atualizar(i,"label",e.target.value)} style={{flex:1,background:"#0e2535",border:"1px solid #1e3f4f",borderRadius:5,padding:"7px 10px",color:"#c8dde0",fontSize:13,fontFamily:"inherit"}}/>
          <input type="number" value={it.valor} onChange={e=>atualizar(i,"valor",e.target.value)} style={{width:110,background:"#0e2535",border:"1px solid #1e3f4f",borderRadius:5,padding:"7px 10px",color:"#e8b84b",fontSize:13,fontFamily:"monospace",textAlign:"right"}}/>
          <button onClick={()=>remover(i)} style={{background:"none",border:"none",color:"#e0654f",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
      ))}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
        <button onClick={adicionar} style={{background:"none",border:"1px dashed #2a5060",borderRadius:5,color:"#5fb8ae",padding:"6px 14px",cursor:"pointer",fontSize:12}}>+ adicionar item</button>
        <span style={{fontFamily:"monospace",fontSize:14,color:"#e8b84b"}}>Total: <b>{fmt(total)}</b></span>
      </div>
    </Panel>
  );
}

function Financeiro({ financeiro, setFinanceiro, calc }) {
  const set = (campo, valor) => setFinanceiro({...financeiro,[campo]:valor});
  const setOcup = (campo, valor) => setFinanceiro({...financeiro,ocupacao:{...financeiro.ocupacao,[campo]:Number(valor)}});
  const inp = {background:"#0e2535",border:"1px solid #1e3f4f",borderRadius:5,padding:"7px 10px",color:"#e8b84b",fontSize:14,fontFamily:"monospace",width:"100%",textAlign:"right"};
  return (
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <Panel label="Parâmetros da hospedagem">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["Nº de camas","camas",financeiro.camas],["Diária seg–qui (R$)","diariaBase",financeiro.diariaBase],["Diária fim de semana (R$)","diariaFimSemana",financeiro.diariaFimSemana],["Bar por cama/dia (R$)","barPorCamaDia",financeiro.barPorCamaDia],["Atividades / mês (R$)","atividadesMes",financeiro.atividadesMes]].map(([label,campo,val]) => (
            <div key={campo}>
              <div style={{fontSize:11,color:"#5a8090",marginBottom:5}}>{label}</div>
              <input type="number" value={val} onChange={e=>set(campo,Number(e.target.value))} style={inp}/>
            </div>
          ))}
        </div>
      </Panel>
      <Panel label="Cenários de ocupação (%)">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[["pessimista","#e0654f"],["realista","#5fb8ae"],["otimista","#e8b84b"]].map(([campo,cor]) => (
            <div key={campo}>
              <div style={{fontSize:11,color:cor,marginBottom:5,textTransform:"capitalize"}}>{campo}</div>
              <input type="number" value={financeiro.ocupacao[campo]} onChange={e=>setOcup(campo,e.target.value)} style={{...inp,color:cor,border:`1px solid ${cor}44`}}/>
            </div>
          ))}
        </div>
      </Panel>
      <LineItems titulo="Investimento inicial" itens={financeiro.investimento} setItens={v=>set("investimento",v)}/>
      <LineItems titulo="Custos fixos mensais" itens={financeiro.custosFixos} setItens={v=>set("custosFixos",v)}/>
      <Panel label="Resultado simulado">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
          {[["Pessimista",calc.pessimista,"#e0654f",financeiro.ocupacao.pessimista],["Realista",calc.realista,"#5fb8ae",financeiro.ocupacao.realista],["Otimista",calc.otimista,"#e8b84b",financeiro.ocupacao.otimista]].map(([nome,c,cor,pct]) => (
            <div key={nome} style={{background:"#0e2535",border:`1px solid ${cor}33`,borderTop:`3px solid ${cor}`,borderRadius:8,padding:"14px 16px"}}>
              <div style={{fontSize:11,color:cor,fontFamily:"monospace",marginBottom:8}}>{nome} · {pct}%</div>
              <div style={{fontFamily:"monospace",fontSize:19,color:"#f3ecdc",fontWeight:600,marginBottom:4}}>{fmt(c.receitaTotal)}</div>
              <div style={{fontSize:11.5,color:"#5a8090",marginBottom:8}}>/mês total</div>
              <div style={{fontSize:13,fontWeight:600,color:c.lucro>=0?cor:"#e0654f"}}>{c.lucro>=0?"+":""}{fmt(c.lucro)}</div>
              <div style={{fontSize:10.5,color:"#3a6070"}}>{c.lucro>=0?"lucro":"prejuízo"}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#0e2535",borderRadius:6,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12.5,color:"#5a8090"}}>Break-even (cenário realista)</span>
          <span style={{fontFamily:"monospace",fontSize:15,color:"#e8b84b",fontWeight:700}}>{calc.breakEven?`${calc.breakEven} meses`:"não atingido"}</span>
        </div>
      </Panel>
    </div>
  );
}

function Notas({ notas, setNotas }) {
  return (
    <div style={{maxWidth:680,margin:"0 auto"}}>
      <Panel label="Suas anotações">
        <textarea value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Ideias, contatos, pendências, decisões importantes..." rows={14}
          style={{width:"100%",background:"#0e2535",border:"1px solid #1e3f4f",borderRadius:6,padding:"14px",color:"#c8dde0",fontSize:14,fontFamily:"'IBM Plex Sans',sans-serif",lineHeight:1.7,resize:"vertical"}}/>
      </Panel>
    </div>
  );
}

function gerarRelatorio(fases, financeiro, notas, calc) {
  const totalTarefas = fases.reduce((s,f)=>s+f.tarefas.length,0);
  const feitas = fases.reduce((s,f)=>s+f.tarefas.filter(t=>t.feito).length,0);
  const progresso = totalTarefas?Math.round((feitas/totalTarefas)*100):0;
  const now = new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
  const fasesHTML = fases.map(f=>{
    const feitasF=f.tarefas.filter(t=>t.feito).length;
    const tarefasHTML=f.tarefas.map(t=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #1e3f4f;align-items:flex-start"><span style="color:${t.feito?f.cor:"#3a6070"};font-size:16px;line-height:1;flex-shrink:0">${t.feito?"✓":"○"}</span><span style="font-size:13px;color:${t.feito?"#5a8090":"#c8dde0"};text-decoration:${t.feito?"line-through":"none"}">${t.texto}</span></div>`).join("");
    return `<div style="background:#112230;border:1px solid #1e3f4f;border-left:4px solid ${f.cor};border-radius:8px;padding:20px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><div style="font-weight:700;font-size:15px;color:${f.cor}">${f.nome}</div><div style="font-family:monospace;font-size:11px;color:#5a8090">${f.periodo}</div></div><div style="font-family:monospace;font-size:18px;color:${f.cor};font-weight:700">${feitasF}/${f.tarefas.length}</div></div>${tarefasHTML}</div>`;
  }).join("");
  const cenariosHTML=[["Pessimista",calc.pessimista,"#e0654f",financeiro.ocupacao.pessimista],["Realista",calc.realista,"#5fb8ae",financeiro.ocupacao.realista],["Otimista",calc.otimista,"#e8b84b",financeiro.ocupacao.otimista]].map(([nome,c,cor,pct])=>`<div style="background:#0e2535;border:1px solid ${cor}33;border-top:3px solid ${cor};border-radius:8px;padding:16px;flex:1"><div style="font-size:11px;color:${cor};font-family:monospace;margin-bottom:8px">${nome} · ${pct}%</div><div style="font-family:monospace;font-size:20px;color:#f3ecdc;font-weight:600;margin-bottom:4px">${fmt(c.receitaTotal)}</div><div style="font-size:11px;color:#5a8090;margin-bottom:10px">/mês</div><div style="font-size:14px;font-weight:700;color:${c.lucro>=0?cor:"#e0654f"}">${c.lucro>=0?"+":""}${fmt(c.lucro)}</div><div style="font-size:10px;color:#3a6070">${c.lucro>=0?"lucro":"prejuízo"}</div></div>`).join("");
  const notasHTML=notas?`<div style="background:#112230;border:1px solid #1e3f4f;border-radius:8px;padding:20px;margin-top:20px"><div style="font-family:monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5fb8ae;margin-bottom:12px">Notas</div><pre style="font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;color:#c8dde0;white-space:pre-wrap;line-height:1.7;margin:0">${notas}</pre></div>`:"";
  return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hostel Roots — Relatório</title><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;padding:32px 20px 60px;background:#0b1e2a;color:#c8dde0;font-family:'IBM Plex Sans',sans-serif}</style></head><body><div style="max-width:720px;margin:0 auto"><div style="text-align:center;margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid #1e3f4f"><div style="font-family:monospace;font-size:11px;letter-spacing:.2em;color:#5fb8ae;margin-bottom:8px">ARACAJU · SE · ${now}</div><div style="font-size:38px;font-weight:700;color:#e8b84b;letter-spacing:-.01em;margin-bottom:4px">HOSTEL ROOTS</div><div style="font-size:13px;color:#5a8090;letter-spacing:.12em">reggae · rock · surf</div><div style="margin-top:20px"><div style="font-size:12px;color:#5a8090;margin-bottom:6px">Progresso geral</div><div style="height:8px;background:#0e2535;border-radius:4px;overflow:hidden;max-width:400px;margin:0 auto"><div style="height:100%;width:${progresso}%;background:linear-gradient(90deg,#1a6fa8,#5fb8ae,#e8b84b);border-radius:4px"></div></div><div style="font-family:monospace;font-size:20px;color:#e8b84b;margin-top:8px;font-weight:600">${progresso}%</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px">${[["Investimento total",fmt(calc.totalInvestimento),"#e8b84b"],["Custo fixo / mês",fmt(calc.totalCustoFixo),"#e0654f"],["Receita realista / mês",fmt(calc.realista.receitaTotal),"#5fb8ae"],["Break-even",calc.breakEven?`${calc.breakEven} meses`:"—","#c8a84b"]].map(([l,v,c])=>`<div style="background:#112230;border:1px solid #1e3f4f;border-top:3px solid ${c};border-radius:8px;padding:16px 18px"><div style="font-size:10px;color:#5a8090;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">${l}</div><div style="font-family:monospace;font-size:20px;color:${c};font-weight:600">${v}</div></div>`).join("")}</div><div style="font-family:monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5fb8ae;margin-bottom:14px">Cenários financeiros</div><div style="display:flex;gap:12px;margin-bottom:28px">${cenariosHTML}</div><div style="font-family:monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#5fb8ae;margin-bottom:14px">Cronograma</div>${fasesHTML}${notasHTML}<div style="text-align:center;margin-top:40px;font-size:11px;color:#2a5060;font-family:monospace">Gerado pelo painel Hostel Roots · ${now}</div></div></body></html>`;
}

function BotaoExportar({ fases, financeiro, notas, calc }) {
  const [hover, setHover] = useState(false);
  const exportar = () => {
    const html = gerarRelatorio(fases, financeiro, notas, calc);
    const win = window.open("","_blank");
    if (win) { win.document.write(html); win.document.close(); }
  };
  return (
    <button onClick={exportar} title="Exportar relatório" onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{position:"fixed",bottom:24,right:20,background:"linear-gradient(135deg,#1a6fa8,#5fb8ae)",border:"none",borderRadius:50,width:52,height:52,color:"#fff",cursor:"pointer",fontSize:20,boxShadow:hover?"0 6px 28px #5fb8ae99":"0 4px 20px #1a6fa888",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,transform:hover?"scale(1.1)":"scale(1)",transition:"all .15s"}}>
      ↗
    </button>
  );
}

function App() {
  const [aba, setAba] = useState("geral");
  const [fases, setFases] = useState(FASES_INICIAIS);
  const [financeiro, setFinanceiro] = useState(FINANCEIRO_INICIAL);
  const [notas, setNotas] = useState("");
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    try {
      const saved = storage.get("hostel-estado");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.fases) setFases(parsed.fases);
        if (parsed.financeiro) setFinanceiro(parsed.financeiro);
        if (parsed.notas !== undefined) setNotas(parsed.notas);
      }
    } catch(e) {}
    setLoaded(true);
  }, []);

  const salvar = (next) => storage.set("hostel-estado", JSON.stringify(next));
  const atualizarFases = next => { setFases(next); salvar({fases:next,financeiro,notas}); };
  const atualizarFinanceiro = next => { setFinanceiro(next); salvar({fases,financeiro:next,notas}); };
  const atualizarNotas = next => { setNotas(next); salvar({fases,financeiro,notas:next}); };
  const toggleTarefa = (faseId, tarefaId) => {
    const next = fases.map(f => f.id!==faseId?f:{...f,tarefas:f.tarefas.map(t=>t.id!==tarefaId?t:{...t,feito:!t.feito})});
    atualizarFases(next);
  };

  const totalTarefas = fases.reduce((s,f)=>s+f.tarefas.length,0);
  const feitas = fases.reduce((s,f)=>s+f.tarefas.filter(t=>t.feito).length,0);
  const progresso = totalTarefas?Math.round((feitas/totalTarefas)*100):0;
  const calc = useMemo(()=>calcular(financeiro),[financeiro]);

  if (!loaded) return null;

  return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% -10%,#163a48 0%,#0b1e2a 65%)",color:"#c8dde0",padding:"28px 16px 80px",fontFamily:"'IBM Plex Sans',sans-serif"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontFamily:"monospace",fontSize:10,letterSpacing:".22em",color:"#5fb8ae",marginBottom:10,textTransform:"uppercase"}}>10°54'S 37°04'O · Aracaju, Sergipe</div>
        <div style={{fontSize:38,fontWeight:800,color:"#e8b84b",letterSpacing:"-.01em",lineHeight:1,marginBottom:4}}>HOSTEL ROOTS</div>
        <div style={{fontSize:13,color:"#5a8090",letterSpacing:".18em",textTransform:"uppercase"}}>reggae · rock · surf</div>
        <WaveDivider/>
      </div>
      <TideBar pct={progresso}/>
      <Nav aba={aba} setAba={setAba}/>
      {aba==="geral" && <VisaoGeral calc={calc}/>}
      {aba==="cronograma" && <Cronograma fases={fases} toggleTarefa={toggleTarefa}/>}
      {aba==="financeiro" && <Financeiro financeiro={financeiro} setFinanceiro={atualizarFinanceiro} calc={calc}/>}
      {aba==="notas" && <Notas notas={notas} setNotas={atualizarNotas}/>}
      <BotaoExportar fases={fases} financeiro={financeiro} notas={notas} calc={calc}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
